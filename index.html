<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedAgenda</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Tela de login ── -->
  <div id="login-screen" class="login-wrap">
    <div class="card">
      <h1>MedAgenda</h1>
      <p class="slogan">A agenda de compromissos feita para estudantes de Medicina.</p>
      <div class="form-group">
        <input type="email" id="email" placeholder="E-mail" autocomplete="email" />
        <input type="password" id="password" placeholder="Senha" autocomplete="current-password" />
      </div>
      <p id="error-msg" class="error"></p>
      <button id="btn-login" class="btn btn-primary">Entrar</button>
    </div>
  </div>

  <!-- ── Aplicação principal ── -->
  <div id="app-screen" hidden>

    <header class="app-header">
      <span class="app-title">MedAgenda</span>
      <div class="header-right">
        <span id="header-email" class="header-email"></span>
        <button id="btn-settings"   class="btn btn-sm btn-ghost">Configurações</button>
        <button id="btn-categories" class="btn btn-sm btn-ghost">Categorias</button>
        <button id="btn-logout" class="btn btn-sm btn-ghost">Sair</button>
      </div>
    </header>

    <main class="app-main">

      <!-- Calendário semanal (vista principal) -->
      <section class="week-section" id="week-container"></section>

      <!-- Calendário mensal -->
      <section class="calendar-section" id="calendar-container"></section>

      <!-- Formulário de compromisso -->
      <section class="form-section">
        <h2 id="form-title">Novo compromisso</h2>

        <form id="event-form" novalidate>
          <input type="hidden" id="event-id" />

          <div class="field">
            <label for="f-title">Título <span class="required">*</span></label>
            <input type="text" id="f-title" placeholder="Ex: Plantão UPA" required />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="f-date">Data <span class="required">*</span></label>
              <input type="date" id="f-date" required />
            </div>
            <div class="field">
              <label for="f-start">Hora início <span class="required">*</span></label>
              <input type="time" id="f-start" required />
            </div>
            <div class="field">
              <label for="f-duration">Duração (min)</label>
              <input type="number" id="f-duration" placeholder="Ex: 120" min="1" />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="f-category">Categoria</label>
              <select id="f-category">
                <option value="">— Selecione —</option>
              </select>
            </div>
            <div class="field">
              <label for="f-color">Cor</label>
              <input type="color" id="f-color" value="#3b82f6" />
            </div>
          </div>

          <div class="field">
            <label for="f-location">Local</label>
            <input type="text" id="f-location" placeholder="Ex: Hospital das Clínicas" />
          </div>

          <div class="field">
            <label for="f-description">Observação</label>
            <textarea id="f-description" rows="2" placeholder="Detalhes adicionais…"></textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="f-reminder">Lembrete</label>
              <select id="f-reminder">
                <option value="">Sem lembrete</option>
                <option value="0">Na hora</option>
                <option value="10">10 minutos antes</option>
                <option value="30">30 minutos antes</option>
                <option value="60">1 hora antes</option>
                <option value="120">2 horas antes</option>
                <option value="1440">1 dia antes</option>
                <option value="custom">Personalizado…</option>
              </select>
              <div id="reminder-custom-wrap" hidden>
                <input type="number" id="f-reminder-custom" placeholder="Minutos antes" min="1" class="reminder-custom-input" />
              </div>
            </div>
            <div class="field">
              <label for="f-recurrence">Repetição</label>
              <select id="f-recurrence">
                <option value="none">Nunca</option>
                <option value="daily">Diariamente</option>
                <option value="weekdays">Dias úteis (Seg–Sex)</option>
                <option value="weekly">Semanalmente</option>
                <option value="biweekly">Quinzenalmente</option>
                <option value="monthly">Mensalmente</option>
                <option value="yearly">Anualmente</option>
                <option value="custom">Personalizada</option>
              </select>
            </div>
          </div>

          <!-- Opções de recorrência — exibidas quando repetição ≠ Nunca -->
          <div id="recurrence-extra" hidden>
            <div id="recurrence-custom" hidden>
              <div class="field">
                <label>Intervalo</label>
                <div class="recurrence-interval-row">
                  A cada
                  <input type="number" id="f-recurrence-interval" value="1" min="1" max="52" />
                  semana(s)
                </div>
              </div>
              <div class="field">
                <label>Dias da semana</label>
                <div class="recurrence-days-wrap" id="f-recurrence-days">
                  <button type="button" class="day-btn" data-day="1">Seg</button>
                  <button type="button" class="day-btn" data-day="2">Ter</button>
                  <button type="button" class="day-btn" data-day="3">Qua</button>
                  <button type="button" class="day-btn" data-day="4">Qui</button>
                  <button type="button" class="day-btn" data-day="5">Sex</button>
                  <button type="button" class="day-btn" data-day="6">Sáb</button>
                  <button type="button" class="day-btn" data-day="0">Dom</button>
                </div>
              </div>
            </div>
            <div class="field">
              <label for="f-recurrence-until">Repetir até (opcional)</label>
              <input type="date" id="f-recurrence-until" />
            </div>
          </div>

          <p id="form-error" class="error"></p>

          <div class="form-actions">
            <button type="submit" id="btn-save" class="btn btn-primary">Salvar compromisso</button>
            <button type="button" id="btn-cancel" class="btn btn-ghost" hidden>Cancelar</button>
          </div>
        </form>
      </section>

      <!-- Lista de compromissos -->
      <section class="list-section">
        <h2>Meus compromissos</h2>
        <p id="list-empty" class="list-empty" hidden>Nenhum compromisso cadastrado.</p>
        <div id="event-list"></div>
      </section>

    </main>
  </div>

  <!-- ── Modal: Gerenciar Categorias ── -->
  <div id="cat-overlay" class="modal-overlay" hidden>
    <div class="modal-card modal-lg">
      <div class="modal-header">
        <span class="modal-date">Gerenciar Categorias</span>
        <button class="modal-close" id="cat-close" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body cat-modal-body">
        <div id="cat-list"></div>
        <div class="cat-add-section">
          <h4 class="cat-add-title">Nova categoria</h4>
          <div class="cat-form-row">
            <input type="color" id="cat-new-color" value="#3b82f6" title="Cor" />
            <input type="text"  id="cat-new-name"  placeholder="Nome da categoria" />
            <button class="btn btn-primary btn-sm" id="cat-add">Adicionar</button>
          </div>
          <p class="error" id="cat-error"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Configurações ── -->
  <div id="settings-overlay" class="modal-overlay" hidden>
    <div class="modal-card modal-lg">
      <div class="modal-header">
        <span class="modal-date">Configurações</span>
        <button class="modal-close" id="settings-close" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-body settings-body">
        <div class="settings-row">
          <div class="settings-info">
            <div class="settings-label">Notificações de lembrete</div>
            <div id="notif-status-text" class="settings-desc"></div>
          </div>
          <button id="btn-notif-toggle" class="btn btn-sm btn-primary">Ativar</button>
        </div>
        <p id="notif-perm-hint" class="settings-hint" hidden></p>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>

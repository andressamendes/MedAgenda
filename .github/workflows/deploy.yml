name: Deploy — GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Guard rails (P1) — nenhuma publicação acontece sem os três abaixo
      # passarem: App Shell sincronizado, suíte de testes e schema do banco
      # compatível. Falhar cedo aqui é sempre mais barato que publicar um
      # frontend incompatível (ver incidente das migrations 11-13).
      - name: Check Service Worker App Shell is in sync
        run: npm run check:app-shell

      - name: Run tests
        run: npm test

      - name: Create config.js from repository secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          {
            echo "export const SUPABASE_URL      = \"${SUPABASE_URL}\";"
            echo "export const SUPABASE_ANON_KEY = \"${SUPABASE_ANON_KEY}\";"
            echo "export const APP_URL           = \"https://andressamendes.github.io/MedAgenda/\";"
            echo "export const VAPID_PUBLIC_KEY  = \"${VAPID_PUBLIC_KEY}\";"
          } > config.js

      - name: Validate database schema (P1 — scripts/check-schema.js)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run check:schema

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

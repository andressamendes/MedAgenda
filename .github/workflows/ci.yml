name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Service Worker App Shell is in sync
        run: npm run check:app-shell

      - name: Run tests
        run: npm test

      # P1 — Guard Rail de Schema: este workflow (ci.yml) roda em qualquer
      # push/PR e não tem acesso ao Supabase de produção (nenhum secret
      # configurado aqui, de propósito — ver docs/OPERATIONS.md). O script
      # falha explicitamente informando essa limitação em vez de mascará-la
      # como sucesso; `continue-on-error` impede que essa limitação conhecida
      # bloqueie PRs não relacionados a schema. A validação real, com acesso
      # ao banco, acontece em deploy.yml antes de qualquer publicação.
      - name: Check database schema (informativo — sem acesso ao banco neste workflow)
        continue-on-error: true
        run: npm run check:schema
